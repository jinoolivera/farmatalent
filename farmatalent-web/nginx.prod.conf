server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ACME challenge (Let's Encrypt via acme-companion)
    location ^~ /.well-known/acme-challenge/ {
        alias /usr/share/nginx/acme/.well-known/acme-challenge/;
        default_type text/plain;
        try_files $uri =404;
    }

    # Laravel API — proxy to backend nginx container
    location /api/ {
        proxy_pass http://farmatalent_backend_nginx;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Sanctum CSRF cookie endpoint
    location /sanctum/ {
        proxy_pass http://farmatalent_backend_nginx;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Email verification route (redirected from backend)
    location /email/ {
        proxy_pass http://farmatalent_backend_nginx;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public storage files
    location /storage/ {
        proxy_pass http://farmatalent_backend_nginx;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
